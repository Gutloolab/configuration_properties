spring:
  application:
    name: school-service

  datasource:
    url: jdbc:mysql://localhost:3306/school_service?createDatabaseIfNotExist=true
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

boot:
  admin:
    client:
      url: http://localhost:1111
