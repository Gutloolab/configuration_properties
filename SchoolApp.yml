spring:
  application:
    name: SchoolApp

  datasource:
    url: jdbc:mysql://localhost:3306/schoolapp_db?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  boot:
    admin:
      client:
        url: http://localhost:1111

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
